<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EufrasioJuegos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e2f;
            color: white;
            text-align: center;
            padding-top: 50px;
        }

        h1 {
            margin-bottom: 40px;
        }

        .contenedor-botones {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .boton {
            display: inline-block;
            width: 250px;
            padding: 15px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .boton:hover {
            background-color: #45a049;
        }

        .volver {
            background-color: #e74c3c;
            margin-top: 30px;
        }

        .volver:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <h1>Bienvenido a la página de juegos</h1>

    <div class="contenedor-botones">
        <a href="https://chonni777.github.io/eufrasiowordle/" class="boton">Wordle</a>
        <a href="https://chonni777.github.io/FNAFEpstein/" class="boton">Five Nights at Epstein's</a>
        <a href="https://chonni777.github.io/Geomtry-Dash/" class="boton">Geometry Dash</a>
        <a href="https://chonni777.github.io/supermariobros/" class="boton">Super Mario Bros</a>
        <a href="https://chonni777.github.io/minecraft2/" class="boton">Minecraft</a>
        <a href="https://chonni777.github.io/FNAF1/" class="boton">Five Nights at Freddy's</a>
    </div>

    <br>

    <a href="https://chonni777.github.io/Calendari-Vicent-Plantada/" class="boton volver">⬅ Volver</a>

</body>
</html>
