<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EufrasioJuegos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e2f;
            color: white;
            text-align: center;
            padding-top: 50px;
        }

        h1 {
            margin-bottom: 40px;
        }

        .contenedor-botones {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .boton {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 250px;
            height: 120px;
            padding: 15px;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
            box-sizing: border-box;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            text-shadow: 2px 2px 5px black;
        }

        .boton:hover {
            transform: scale(1.05);
            filter: brightness(1.15);
        }

        .wordle {
            background-image: url("wordle.png");
        }

        .geometry {
            background-image: url("geometrydash.jpg");
        }

        .mario {
            background-image: url("mario.png");
        }

        .minecraft {
            background-image: url("minecraft.jpg");
        }

        .fnaf {
            background-image: url("fnaf.jpg");
        }

        .snake {
            background-image: url("snake.jpg");
        }

        .kirby {
            background-image: url("kirby.png");
        }

        .pokemon {
            background-image: url("pokemon.jpg");
        }

        .sonic {
            backgrounf-image: url("sonic.jpg");
        }

        .volver {
            background-color: #e74c3c;
            background-image: none;
            height: auto;
            margin-top: 30px;
        }

        .volver:hover {
            background-color: #c0392b;
            transform: scale(1.05);
            filter: none;
        }
    </style>
</head>
<body>

    <h1>Bienvenido a la página de juegos</h1>

    <div class="contenedor-botones">
        <a href="https://chonni777.github.io/eufrasiowordle/" class="boton wordle"></a>
        <a href="https://chonni777.github.io/Geomtry-Dash/" class="boton geometry">Geometry Dash</a>
        <a href="https://chonni777.github.io/supermariobros/" class="boton mario"></a>
        <a href="https://chonni777.github.io/minecraft2/" class="boton minecraft">Minecraft</a>
        <a href="https://chonni777.github.io/FNAF1/" class="boton fnaf"></a>
        <a href=" https://chonni777.github.io/snkae/" class="boton snake"></a>
        <a href="https://chonni777.github.io/Kirby-Super-Star/" class="boton kirby"></a>
        <a href="https://chonni777.github.io/pokemon-esmeralda/" class="boton pokemon">Pokemon Esmeralda</a>
        <a href="https://chonni777.github.io/sonic/" class="boton sonic"></a>
    </div>

    <br>

    <a href="https://chonni777.github.io/Calendari-Vicent-Plantada/" class="boton volver">⬅ Volver</a>

</body>
</html>
